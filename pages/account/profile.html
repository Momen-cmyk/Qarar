<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حسابي - خطوة أمان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/shell.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="./account.css">
  <script src="../../js/theme.js"></script>
</head>
<body data-page="account" data-title="حسابي" data-settings="true">
  <div class="app-shell">
    <div id="navRail"></div>
    <main class="app-frame">
      <header id="topBar"></header>
      <div class="app-frame__inner">

        <div class="profile-header">
          <div class="profile-header__avatar">🧑</div>
          <h1 id="profileName">مستخدم</h1>
          <div class="profile-header__meta">
            <span class="badge badge-primary" id="profileLevel">مبتدئ واعٍ</span>
            <button class="btn-text" id="editProfileBtn">تعديل الملف الشخصي</button>
          </div>
        </div>

        <div class="card level-card">
          <div class="level-card__progress">
            <div class="progress-track"><div class="progress-fill" id="levelProgress" style="width:0%"></div></div>
            <div class="level-card__hint" id="nextLevelText"></div>
          </div>
          <div>
            <div class="level-card__points" id="totalPoints">0</div>
            <div class="level-card__label">نقطة</div>
          </div>
        </div>

        <h2 class="section-title">شاراتي</h2>
        <div class="badges-grid">
          <div class="card badge-item is-locked"><div class="badge-item__icon">🔒</div><p>سفير أمان</p></div>
          <div class="card badge-item"><div class="badge-item__icon">🚦</div><p>خبير سلامة</p></div>
          <div class="card badge-item"><div class="badge-item__icon">🥇</div><p>مكتمل التوعية</p></div>
        </div>

        <h2 class="section-title">شهاداتي</h2>
        <div id="certsList"></div>

        <h2 class="section-title">بلاغاتي</h2>
        <a class="card" href="../reporting/reports-history.html">عرض كل بلاغاتي السابقة ←</a>

      </div>
    </main>
  </div>
  <nav id="tabBar"></nav>

  <div class="modal" id="editProfileModal">
    <div class="modal__panel">
      <h3>تعديل الملف الشخصي</h3>
      <form id="editProfileForm">
        <div class="field"><label for="editName">الاسم</label><input id="editName" required maxlength="40"></div>
        <div class="field"><label for="editIdentifier">البريد أو الهاتف</label><input id="editIdentifier"></div>
        <div class="modal__actions">
          <button type="button" class="btn btn-outline" id="cancelEditProfile">إلغاء</button>
          <button type="submit" class="btn btn-primary">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../../js/storage.js"></script>
  <script src="../../js/shell.js"></script>
  <script src="./account.js"></script>
</body>
</html>
