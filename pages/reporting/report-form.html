<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إرسال بلاغ - قرار</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/shell.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="./reporting.css">
  <script src="../../js/theme.js"></script>
</head>
<body data-title="إرسال بلاغ" data-back="true">
  <div class="app-shell">
    <div id="navRail"></div>
    <main class="app-frame">
      <header id="topBar"></header>
      <div class="app-frame__inner">

        <form id="reportForm">
          <h2 class="section-title" style="margin-top:0">نوع البلاغ</h2>
          <div class="report-type-grid">
            <label class="card report-type"><input type="radio" name="reportType" value="reckless_driver" required><span class="report-type__icon">🚗</span>سائق متهور</label>
            <label class="card report-type"><input type="radio" name="reportType" value="broken_signal"><span class="report-type__icon">🚦</span>إشارة تالفة</label>
            <label class="card report-type"><input type="radio" name="reportType" value="dangerous_bump"><span class="report-type__icon">⚠️</span>مطب خطير</label>
            <label class="card report-type"><input type="radio" name="reportType" value="accident"><span class="report-type__icon">🚨</span>حادث يحتاج تدخل</label>
            <label class="card report-type"><input type="radio" name="reportType" value="other"><span class="report-type__icon">📌</span>أخرى</label>
          </div>

          <h2 class="section-title">الموقع</h2>
          <button type="button" class="btn btn-outline" id="autoLocationBtn">📍 تحديد الموقع تلقائيًا</button>
          <div class="map-placeholder" style="margin-top: var(--space-md)">سيظهر الموقع المحدد هنا</div>

          <h2 class="section-title">صورة (اختياري)</h2>
          <label class="upload-box">
            <span>📷</span>
            <span>إضافة صورة</span>
            <input type="file" id="photoInput" accept="image/*" hidden>
          </label>

          <div class="field">
            <label for="description">وصف الحالة (اختياري)</label>
            <textarea id="description" rows="3" placeholder="اكتب وصفًا مختصرًا..."></textarea>
          </div>

          <label class="checkbox-row" style="margin-bottom: var(--space-md)">
            <input type="checkbox" id="anonymousCheck"> إرسال بدون ذكر اسمي
          </label>

          <button class="btn btn-danger" type="submit">إرسال البلاغ</button>
        </form>

      </div>
    </main>
  </div>
  <nav id="tabBar"></nav>

  <script src="../../js/storage.js"></script>
  <script src="../../js/shell.js"></script>
  <script src="./reporting.js"></script>
</body>
</html>
