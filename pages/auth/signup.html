<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب - خطوة أمان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="./auth.css">
  <script src="../../js/theme.js"></script>
</head>
<body>
  <div class="auth-screen">
    <button class="btn-text auth__back" onclick="window.history.back()">→ رجوع</button>
    <div class="auth__badge">🚦</div>
    <h1>إنشاء حساب جديد</h1>
    <p class="auth__lead">انضم لآلاف المستخدمين الذين يجعلون الطريق أكثر أمانًا.</p>

    <form id="signupForm">
      <div class="field">
        <label for="fullName">الاسم الكامل</label>
        <input id="fullName" type="text" required placeholder="اسمك">
      </div>
      <div class="field">
        <label for="signupIdentifier">البريد الإلكتروني أو رقم الهاتف</label>
        <input id="signupIdentifier" type="text" required placeholder="example@email.com">
      </div>
      <div class="field">
        <label for="signupPassword">كلمة المرور</label>
        <input id="signupPassword" type="password" required placeholder="••••••••">
      </div>
      <button class="btn btn-primary" type="submit">إنشاء الحساب</button>
    </form>

    <p class="auth__footer">لديك حساب بالفعل؟ <a href="./login.html">تسجيل الدخول</a></p>
  </div>

  <script src="../../js/storage.js"></script>
  <script src="./auth.js"></script>
</body>
</html>
