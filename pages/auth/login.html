<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - خطوة أمان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="./auth.css">
  <script src="../../js/theme.js"></script>
</head>
<body>
  <div class="auth-screen">
    <div class="auth__badge">🚦</div>
    <h1>أهلًا بعودتك</h1>
    <p class="auth__lead">سجّل دخولك لمتابعة تقدمك ونقاطك.</p>

    <form id="loginForm">
      <div class="field">
        <label for="loginIdentifier">البريد الإلكتروني أو رقم الهاتف</label>
        <input id="loginIdentifier" type="text" required placeholder="example@email.com">
      </div>
      <div class="field">
        <label for="loginPassword">كلمة المرور</label>
        <input id="loginPassword" type="password" required placeholder="••••••••">
      </div>
      <p class="auth__forgot"><a href="#">نسيت كلمة المرور؟</a></p>
      <button class="btn btn-primary" type="submit">تسجيل الدخول</button>
    </form>

    <div class="auth__divider">أو</div>
    <button class="btn btn-outline" id="guestBtn">المتابعة كزائر</button>

    <p class="auth__footer">ليس لديك حساب؟ <a href="./signup.html">إنشاء حساب جديد</a></p>
  </div>

  <script src="../../js/storage.js"></script>
  <script src="./auth.js"></script>
</body>
</html>
