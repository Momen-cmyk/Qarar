<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل المحتوى - خطوة أمان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/shell.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="./content-detail.css">
  <script src="../../js/theme.js"></script>
</head>
<body data-page="accidents" data-title="" data-back="true">
  <div class="app-shell">
    <div id="navRail"></div>
    <main class="app-frame">
      <header id="topBar"></header>
      <div class="app-frame__inner">

        <video class="media-video" id="mediaVideo" controls playsinline></video>
        <h1 id="contentTitle">عنوان المحتوى</h1>
        <p id="contentBody">وصف المحتوى سيظهر هنا.</p>

        <div class="content-actions">
          <button class="btn-text" id="likeBtn">❤️ <span id="likeCount">128</span></button>
          <button class="btn-text" id="saveBtn">🔖 حفظ</button>
          <button class="btn-text" id="shareBtn">↗️ مشاركة</button>
        </div>

        <button class="btn btn-outline" id="shareStoryBtn" style="margin-top: var(--space-lg)">✍️ شارك قصتك</button>

      </div>
    </main>
  </div>
  <nav id="tabBar"></nav>

  <script src="../../js/storage.js"></script>
  <script src="../../js/shell.js"></script>
  <script src="./content-detail.js"></script>
</body>
</html>
