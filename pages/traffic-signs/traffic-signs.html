<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اختبار إشارات المرور - خطوة أمان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/shell.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="./traffic-signs.css">
  <script src="../../js/theme.js"></script>
</head>
<body data-page="" data-title="اختبار إشارات المرور" data-back="true">
  <div class="app-shell">
    <div id="navRail"></div>
    <main class="app-frame">
      <header id="topBar"></header>
      <div class="app-frame__inner">

        <div id="quizIntro" class="ts-intro">
          <div style="font-size:3rem">🚦</div>
          <h1>اختبار إشارات المرور</h1>
          <p>اختبر معرفتك بإشارات المرور وكن سائقًا أكثر أمانًا</p>

          <h2 class="section-title">اختر التصنيف:</h2>
          <div class="category-grid">
            <button class="category-btn is-active" data-category="all"><span class="category-btn__icon">🚦</span>الكل</button>
            <button class="category-btn" data-category="إشارات تنظيمية"><span class="category-btn__icon">⛔</span>تنظيمية</button>
            <button class="category-btn" data-category="إشارات تحذيرية"><span class="category-btn__icon">⚠️</span>تحذيرية</button>
            <button class="category-btn" data-category="إشارات إرشادية"><span class="category-btn__icon">ℹ️</span>إرشادية</button>
            <button class="category-btn" data-category="إشارات مؤقتة"><span class="category-btn__icon">🚧</span>مؤقتة</button>
          </div>

          <button class="btn btn-primary" id="startQuizBtn">ابدأ الاختبار</button>
        </div>

        <div id="quizScreen" class="visually-hidden">
          <div class="quiz-progress-row">
            <span>سؤال <span id="qIndex">1</span> من <span id="qTotal">10</span></span>
            <div class="progress-track"><div class="progress-fill" id="qFill" style="width:10%"></div></div>
            <span>⭐ <span id="qScore">0</span></span>
          </div>

          <div class="card sign-card">
            <div class="sign-card__emoji" id="signEmoji">🚦</div>
            <div class="sign-card__tags">
              <span class="badge badge-primary" id="signCategory"></span>
              <span class="badge badge-primary" id="signShape"></span>
              <span class="badge badge-primary" id="signColor"></span>
            </div>
          </div>

          <h2 class="quiz-question" id="questionText"></h2>
          <div class="answers-grid" id="answersContainer"></div>

          <div id="explanationBox" class="explanation-box visually-hidden">
            <h4>💡 الشرح:</h4>
            <p class="explanation-text"></p>
            <p class="next-hint">السؤال التالي خلال ثوانٍ...</p>
          </div>
        </div>

        <div id="quizResult" class="ts-result visually-hidden">
          <div class="ts-result__icon" id="resultIcon">🎉</div>
          <h1 id="resultScore">0 من 10</h1>
          <div class="ts-result__pct" id="resultPct">0%</div>
          <p id="resultMsg"></p>
          <p class="badge badge-accent" id="pointsEarned">+0</p>
          <button class="btn btn-primary" id="retryBtn">اختبار آخر</button>
          <a class="btn btn-outline" href="../home/home.html" style="margin-top: var(--space-sm)">العودة للرئيسية</a>
        </div>

      </div>
    </main>
  </div>
  <nav id="tabBar"></nav>

  <script src="../../js/storage.js"></script>
  <script src="../../js/shell.js"></script>
  <script src="../../js/traffic-signs-data.js"></script>
  <script src="./traffic-signs.js"></script>
</body>
</html>
